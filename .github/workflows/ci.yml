name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test, lint & bundle
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - name: Install SwiftLint
        run: HOMEBREW_NO_AUTO_UPDATE=1 brew install swiftlint
      - name: Lint
        run: swiftlint lint --strict
      - name: Test
        run: swift test -Xswiftc -warnings-as-errors
      - name: Bundle
        run: |
          ./Scripts/make-icon.sh
          ./Scripts/bundle.sh --config release
